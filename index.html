<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem e-Pencapaian Kokurikulum - SMK Likas</title>
    
    <!-- Enjin Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tetapan Tema Khas SMK LIKAS (Edisi Neon Dark 2026) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#1FA3D1',
                        'brand-yellow': '#FFD400',
                        'dark-bg': '#0f172a',
                        'dark-card': 'rgba(30, 41, 59, 0.7)',
                        'neon-glow': 'rgba(31, 163, 209, 0.3)'
                    },
                    borderRadius: {
                        '3xl': '1.75rem',
                        '4xl': '2.25rem',
                    }
                }
            }
        }
    </script>
    
    <!-- Ikon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style type="text/css">
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-attachment: fixed;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        @media print {
            .print\:hidden { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-card { background: white !important; border: 1px solid #ccc !important; color: black !important; }
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-border-blue {
            border: 1px solid rgba(31, 163, 209, 0.4);
            box-shadow: 0 0 15px rgba(31, 163, 209, 0.1);
        }

        .neon-text-yellow {
            color: #FFD400;
            text-shadow: 0 0 10px rgba(255, 212, 0, 0.3);
        }

        .active-tab {
            background: #1FA3D1;
            box-shadow: 0 0 20px rgba(31, 163, 209, 0.4);
            color: white !important;
        }

        input, select {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus {
            border-color: #1FA3D1 !important;
            box-shadow: 0 0 0 4px rgba(31, 163, 209, 0.2) !important;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #1FA3D1 0%, #0c4a6e 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        function App() {
            const [rawData, setRawData] = useState([]);
            const [cloudRecords, setCloudRecords] = useState([]); 
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [error, setError] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);
            
            const [activeTab, setActiveTab] = useState('form');
            const [editingRow, setEditingRow] = useState(null);

            const initialFormState = {
                id: '', nama: '', kp: '', tingkatan: '', kelas: '', acara: '', peringkat: '', pencapaian: ''
            };

            const [formData, setFormData] = useState(initialFormState);
            const [notification, setNotification] = useState(null);

            const parseCSV = (text) => {
                const cleanText = text.replace(/^\uFEFF/, ''); 
                const result = [];
                let row = [];
                let col = '';
                let inQuotes = false;
                for (let i = 0; i < cleanText.length; i++) {
                    let char = cleanText[i];
                    let nextChar = cleanText[i + 1];
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') { col += '"'; i++; } else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) {
                        row.push(col); col = '';
                    } else if ((char === '\n' || char === '\r') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') i++; 
                        row.push(col); result.push(row); row = []; col = '';
                    } else { col += char; }
                }
                if (col !== '' || cleanText[cleanText.length - 1] === ',') row.push(col);
                if (row.length > 0) result.push(row);
                if (result.length === 0) return { data: [] };
                let headerIdx = 0;
                for (let i = 0; i < Math.min(30, result.length); i++) {
                    if (result[i].some(c => String(c).toUpperCase().includes('NAMA'))) { headerIdx = i; break; }
                }
                const headers = result[headerIdx] ? result[headerIdx].map(h => String(h).trim().toUpperCase()) : [];
                const data = [];
                for (let i = headerIdx + 1; i < result.length; i++) {
                    if (result[i].join('').trim() === '') continue; 
                    const obj = {};
                    for (let j = 0; j < Math.max(headers.length, result[i].length); j++) {
                        const h = headers[j] || `KOL_${j + 1}`;
                        const v = result[i][j] ? String(result[i][j]).trim() : '';
                        obj[h] = v;
                        obj[`_idx_${j}`] = v;
                    }
                    obj._sheetRow = i + 1; 
                    data.push(obj);
                }
                return { data };
            };

            const formatIC = (value) => {
                if (!value) return '';
                let strVal = String(value).replace(/^'/, '').replace(/^="?([^"]+)"?$/, '$1');
                let digits = strVal.replace(/\D/g, '');
                if (digits.length < 8 && !/^\d+$/.test(strVal)) return ''; 
                return digits.length >= 8 && digits.length < 12 ? digits.padStart(12, '0') : (digits.length === 12 ? digits : strVal.trim());
            };

            const extractField = (row, keywords, fallbackIndices) => {
                const keys = Object.keys(row).filter(k => !k.startsWith('_idx_'));
                for (let kw of keywords) {
                    const exactKey = keys.find(k => k.trim().toUpperCase() === kw.toUpperCase());
                    if (exactKey && row[exactKey]) return row[exactKey];
                }
                for (let kw of keywords) {
                    const matchedKey = keys.find(k => k.toUpperCase().includes(kw.toUpperCase()));
                    if (matchedKey && row[matchedKey]) return row[matchedKey];
                }
                for (let idx of fallbackIndices) {
                    if (row[`_idx_${idx}`]) return row[`_idx_${idx}`];
                }
                return '';
            };

            const extractStudentData = (row) => {
                const nama = extractField(row, ['NAMA MURID', 'NAMA', 'NAME'], [1]);
                const kp = extractField(row, ['NO. PENGENALAN', 'NO. KP', 'NO. KAD PENGENALAN', 'KP', 'IC'], [2]);
                const id = extractField(row, ['ID MURID', 'ID', 'KOD'], [0]);
                const ting = extractField(row, ['TINGKATAN', 'FORM', 'TING'], [3]);
                const kelas = extractField(row, ['NAMA KELAS', 'KELAS', 'CLASS'], [4]);

                return {
                    nama: nama || 'PELAJAR',
                    id: formatIC(id),
                    kp: formatIC(kp),
                    tingkatan: ting,
                    kelas: kelas
                };
            };

            const loadAllData = async () => {
                setLoading(true);
                try {
                    const ts = new Date().getTime(); 
                    const idmeUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-KOkN92rvUsk8_sF-twkRLuyO7Nm639dxmKb0MP41X8NTzZB3YIZ2iPRuPGqn9L8mgGlEaVC1Plkr/pub?gid=0&single=true&output=csv&t=${ts}`;
                    const cloudUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-KOkN92rvUsk8_sF-twkRLuyO7Nm639dxmKb0MP41X8NTzZB3YIZ2iPRuPGqn9L8mgGlEaVC1Plkr/pub?gid=112202218&single=true&output=csv&t=${ts}`;
                    
                    const [res1, res2] = await Promise.all([
                        fetch(idmeUrl, {cache: 'no-cache'}), 
                        fetch(cloudUrl, {cache: 'no-cache'})
                    ]);
                    
                    const txt1 = await res1.text();
                    setRawData(parseCSV(txt1).data);

                    const txt2 = await res2.text();
                    if (!txt2.includes('<!DOCTYPE')) {
                        const p2 = parseCSV(txt2).data;
                        const mapped = p2.map(row => {
                            return {
                                id: formatIC(row['ID'] || row['_idx_0']),
                                nama: row['NAMA MURID'] || row['NAMA'] || row['_idx_1'],
                                kp: formatIC(row['NO. PENGENALAN'] || row['PENGENALAN'] || row['NO. KP'] || row['_idx_2']),
                                tingkatan: row['TINGKATAN'] || row['_idx_3'],
                                kelas: row['NAMA KELAS'] || row['KELAS'] || row['_idx_4'],
                                acara: row['ACARA'] || row['_idx_5'],
                                peringkat: row['PERINGKAT'] || row['_idx_6'],
                                pencapaian: row['PENCAPAIAN'] || row['_idx_7'],
                                sheetRow: row._sheetRow 
                            };
                        }).filter(r => r.nama && r.acara);
                        setCloudRecords(mapped);
                    }
                    setLoading(false);
                } catch (err) { setError("Gagal muat data."); setLoading(false); }
            };

            useEffect(() => { loadAllData(); }, []);

            const filteredStudents = useMemo(() => {
                if (!searchQuery.trim()) return [];
                const q = searchQuery.toLowerCase();
                return rawData.filter(r => Object.values(r).join(' ').toLowerCase().includes(q)).slice(0, 8);
            }, [searchQuery, rawData]);

            const handleSelect = (r) => {
                const s = extractStudentData(r);
                setFormData({...formData, ...s});
                setSearchQuery(s.nama);
                setIsDropdownOpen(false);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const URL = "https://script.google.com/macros/s/AKfycbx063mNTJfQGzNznudOcXqit1Ky50ozHppHkcleVGx1LuLZ2O2R9prs5ZvhxCi71DgC5A/exec";
                try {
                    const formatted = { ...formData, id: formData.id ? `'${formData.id}` : '', kp: formData.kp ? `'${formData.kp}` : '' };
                    const payload = editingRow ? { action: 'update', sheetRow: editingRow, data: formatted } : { action: 'append', data: formatted };
                    const res = await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if (result.result === 'success') {
                        setNotification({ type: 'success', msg: "Data berjaya diproses!" });
                        setFormData(initialFormState); setSearchQuery(''); setEditingRow(null);
                        loadAllData();
                    }
                } catch (err) { setNotification({ type: 'error', msg: "Ralat semasa menyimpan data." }); }
                finally { setIsSaving(false); setTimeout(() => setNotification(null), 3000); }
            };

            const handleExport = () => {
                if (!cloudRecords.length) return;
                const headers = ['ID','NAMA MURID','NO. PENGENALAN','TINGKATAN','NAMA KELAS','ACARA','PERINGKAT','PENCAPAIAN'];
                const csv = [headers.join(','), ...cloudRecords.map(r => [`"=""${r.id}"""`,`"${r.nama}"`,`"=""${r.kp}"""`,`"${r.tingkatan}"`,`"${r.kelas}"`,`"${r.acara}"`,`"${r.peringkat}"`,`"${r.pencapaian}"`].join(','))].join('\n');
                const blob = new Blob([csv], {type:'text/csv'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'Rekod_Pencapaian_SMKLikas.csv'; a.click();
            };

            const handleEditClick = (record) => {
                setFormData({
                    id: record.id || '',
                    nama: record.nama || '',
                    kp: record.kp || '',
                    tingkatan: record.tingkatan || '',
                    kelas: record.kelas || '',
                    acara: (record.acara || '').toUpperCase(),
                    peringkat: (record.peringkat || '').toUpperCase(),
                    pencapaian: (record.pencapaian || '').toUpperCase()
                });
                setEditingRow(record.sheetRow);
                setActiveTab('form');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const stats = useMemo(() => {
                if (!cloudRecords.length) return null;
                const pC = {}, aC = {}, mC = {};
                cloudRecords.forEach(r => {
                    const pKey = (r.peringkat || '').toUpperCase();
                    const aKey = (r.acara || '').toUpperCase();
                    pC[pKey] = (pC[pKey] || 0) + 1;
                    aC[aKey] = (aC[aKey] || 0) + 1;
                    const key = `${r.nama} (${r.kelas})`; mC[key] = (mC[key] || 0) + 1;
                });
                return {
                    total: cloudRecords.length,
                    acara: Object.keys(aC).length,
                    peringkat: Object.entries(pC).sort((a,b) => b[1]-a[1]),
                    topStudents: Object.entries(mC).sort((a,b) => b[1]-a[1]).slice(0, 5)
                };
            }, [cloudRecords]);

            const displayRecords = useMemo(() => [...cloudRecords].reverse(), [cloudRecords]);

            return (
                <div class="min-h-screen pb-24">
                    <header class="fixed top-0 w-full z-50 glass-card border-none print:hidden">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
                            {/* Ditambah pr-12 pada wrapper skrin telefon dan pb-2 untuk memastikan margin yang secukupnya */}
                            <div class="flex items-center gap-3 sm:gap-6 overflow-x-auto hide-scrollbar pr-12 sm:pr-4 pb-2 sm:pb-0 w-full sm:w-auto">
                                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-white rounded-full p-0.5 sm:p-1 shadow-[0_0_15px_rgba(255,255,255,0.2)] flex items-center justify-center overflow-hidden border border-white/20 shrink-0">
                                    <img src="https://i.postimg.cc/bY4pyb0M/LOGO-LIKAS.png" class="w-full h-full object-contain" alt="Logo" />
                                </div>
                                <div class="shrink-0 flex flex-col justify-center">
                                    <h1 class="text-white font-extrabold text-base sm:text-2xl lg:text-3xl tracking-tight leading-none uppercase">e-Pencapaian</h1>
                                    <p class="neon-text-yellow text-[9px] sm:text-sm lg:text-base font-black uppercase tracking-[0.2em] sm:tracking-[0.3em] mt-1 sm:mt-1.5">SMK LIKAS</p>
                                </div>
                                
                                {/* Ditambah pr-6 pada bekas dan pr-8 pada perkataan "Holistik" supaya huruf tak terpotong */}
                                <div class="ml-2 sm:ml-5 pl-3 sm:pl-6 pr-6 sm:pr-0 border-l-2 border-white/20 flex flex-col justify-center shrink-0">
                                    <div class="bg-gradient-to-r from-[#B8860B] via-[#FFD700] to-[#B8860B] px-4 sm:px-12 py-1 sm:py-1.5 rounded sm:rounded-md text-center shadow-[0_0_15px_rgba(255,215,0,0.3)]">
                                        <span class="text-[#002200] font-black italic text-[9px] sm:text-sm lg:text-lg tracking-[0.3em] sm:tracking-[0.5em] block leading-none">KOKURIKULUM</span>
                                    </div>
                                    <span class="text-emerald-300 italic font-black text-[8px] sm:text-xs lg:text-sm text-center leading-tight mt-1.5 sm:mt-2 drop-shadow-lg whitespace-nowrap pr-8 sm:pr-2">
                                        Kokurikulum Dinamik, Murid Holistik
                                    </span>
                                </div>
                            </div>
                            <div class="hidden sm:flex gap-2 sm:gap-3 shrink-0 ml-2">
                                <button onClick={loadAllData} class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-xl sm:rounded-2xl bg-white/10 text-white active:bg-brand-blue transition-all">
                                    <i class={`fas fa-sync-alt text-sm sm:text-lg ${loading ? 'fa-spin' : ''}`}></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-7xl mx-auto px-4 pt-24 sm:pt-32">
                        <div class="flex justify-center mb-10 print:hidden">
                            <div class="bg-slate-900/50 p-1.5 rounded-[2rem] flex gap-1 w-full max-w-sm border border-white/10">
                                <button onClick={() => setActiveTab('form')} class={`flex-1 py-2.5 sm:py-3 rounded-[1.5rem] text-xs sm:text-sm font-black transition-all flex items-center justify-center gap-2 ${activeTab === 'form' ? 'active-tab' : 'text-slate-400 hover:text-white'}`}>
                                    <i class="fas fa-edit"></i> <span class="hidden sm:inline">BORANG</span><span class="sm:hidden">BORANG</span>
                                </button>
                                <button onClick={() => setActiveTab('analysis')} class={`flex-1 py-2.5 sm:py-3 rounded-[1.5rem] text-xs sm:text-sm font-black transition-all flex items-center justify-center gap-2 ${activeTab === 'analysis' ? 'active-tab' : 'text-slate-400 hover:text-white'}`}>
                                    <i class="fas fa-chart-line"></i> <span class="hidden sm:inline">STATISTIK</span><span class="sm:hidden">DATA</span>
                                </button>
                            </div>
                        </div>

                        {notification && (
                            <div class="fixed top-20 left-4 right-4 sm:left-1/2 sm:-translate-x-1/2 sm:w-auto z-[100] px-6 py-4 rounded-2xl shadow-2xl glass-card border-brand-blue/30 text-white text-center animate-in zoom-in-95 duration-300">
                                <div class="flex items-center justify-center gap-3">
                                    <i class={`fas ${notification.type === 'success' ? 'fa-check-circle text-emerald-400' : 'fa-exclamation-circle text-red-400'} text-lg`}></i>
                                    <span class="font-bold text-sm">{notification.msg}</span>
                                </div>
                            </div>
                        )}

                        {activeTab === 'form' && (
                            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div class="lg:col-span-4 space-y-6 print:hidden">
                                    <div class="glass-card rounded-[2.5rem] p-8 neon-border-blue relative overflow-hidden">
                                        <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-blue/10 rounded-full blur-3xl"></div>
                                        <h2 class="text-xl font-black text-white mb-8 flex items-center gap-3">
                                            <i class={`fas ${editingRow ? 'fa-pen-nib text-brand-yellow' : 'fa-plus-circle text-brand-blue'}`}></i>
                                            {editingRow ? 'Kemaskini Rekod' : 'Kemasukan Data'}
                                        </h2>

                                        {!editingRow && (
                                            <div class="relative mb-8" ref={dropdownRef}>
                                                <div class="relative">
                                                    <input type="text" class="w-full rounded-2xl px-6 py-4 pl-14 text-sm font-bold transition-all outline-none text-white" placeholder="Cari Nama Pelajar..." value={searchQuery} onChange={(e)=>{setSearchQuery(e.target.value); setIsDropdownOpen(true);}} onFocus={()=>setIsDropdownOpen(true)}/>
                                                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                                </div>
                                                {isDropdownOpen && filteredStudents.length > 0 && (
                                                    <div class="absolute w-full mt-3 glass-card rounded-3xl shadow-2xl border border-white/20 overflow-hidden z-50">
                                                        {filteredStudents.map((r, i) => {
                                                            const s = extractStudentData(r);
                                                            return (
                                                                <button key={i} onClick={()=>handleSelect(r)} class="w-full px-6 py-4 text-left hover:bg-white/10 flex flex-col border-b border-white/5 last:border-0">
                                                                    <span class="text-sm font-black text-white uppercase">{s.nama}</span>
                                                                    <span class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-wider">{s.tingkatan} {s.kelas} • {s.kp}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <form onSubmit={handleSave} class="space-y-6">
                                            <div class="grid grid-cols-2 gap-4">
                                                <div class="col-span-2">
                                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Nama Penuh Murid</label>
                                                    <input required type="text" class="w-full rounded-2xl px-5 py-4 text-sm font-bold uppercase" value={formData.nama} onChange={(e)=>setFormData({...formData, nama: e.target.value})}/>
                                                </div>
                                                <div>
                                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">No. Pengenalan (IC)</label>
                                                    <input type="text" class="w-full rounded-2xl px-5 py-4 text-sm font-bold font-mono" value={formData.kp} onChange={(e)=>setFormData({...formData, kp: e.target.value})}/>
                                                </div>
                                                <div>
                                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Nama Kelas</label>
                                                    <input type="text" class="w-full rounded-2xl px-5 py-4 text-sm font-bold" value={formData.kelas} onChange={(e)=>setFormData({...formData, kelas: e.target.value})}/>
                                                </div>
                                            </div>
                                            
                                            <div>
                                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Acara / Pertandingan</label>
                                                <input required type="text" class="w-full rounded-2xl px-5 py-4 text-sm font-bold uppercase" placeholder="Cth: BOLA SEPAK" value={formData.acara} onChange={(e)=>setFormData({...formData, acara: e.target.value.toUpperCase()})}/>
                                            </div>

                                            <div class="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Peringkat</label>
                                                    <select required class="w-full rounded-2xl px-5 py-4 text-sm font-bold appearance-none uppercase" value={formData.peringkat} onChange={(e)=>setFormData({...formData, peringkat: e.target.value})}>
                                                        <option value="">PILIH</option>
                                                        {['SEKOLAH','ZON','DAERAH','NEGERI','KEBANGSAAN','ANTARABANGSA'].map(v=><option key={v} value={v}>{v}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Pencapaian</label>
                                                    <select required class="w-full rounded-2xl px-5 py-4 text-sm font-bold appearance-none uppercase" value={formData.pencapaian} onChange={(e)=>setFormData({...formData, pencapaian: e.target.value})}>
                                                        <option value="">PILIH</option>
                                                        {['JOHAN','NAIB JOHAN','KETIGA','KEEMPAT','PENYERTAAN','EMAS','PERAK','GANGSA'].map(v=><option key={v} value={v}>{v}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div class="pt-6">
                                                <button disabled={isSaving} type="submit" class="w-full btn-gradient text-white py-5 rounded-[2rem] font-black text-sm tracking-wider flex items-center justify-center gap-3 shadow-xl">
                                                    {isSaving ? <i class="fas fa-spinner fa-spin"></i> : <i class="fas fa-paper-plane"></i>}
                                                    {editingRow ? 'KEMASKINI DATA' : 'SIMPAN REKOD'}
                                                </button>
                                                {editingRow && (
                                                    <button type="button" onClick={()=>{setEditingRow(null); setFormData(initialFormState);}} class="w-full mt-4 text-slate-400 font-bold text-xs hover:text-white transition-colors">BATALKAN MOD EDIT</button>
                                                )}
                                            </div>
                                        </form>
                                    </div>
                                </div>

                                <div class="lg:col-span-8">
                                    <div class="glass-card rounded-[2.5rem] overflow-hidden flex flex-col h-full border-none">
                                        <div class="p-8 border-b border-white/5 flex items-center justify-between print:hidden">
                                            <h3 class="text-white font-black text-lg flex items-center gap-3">
                                                <span class="w-10 h-10 rounded-2xl bg-brand-blue/20 text-brand-blue flex items-center justify-center"><i class="fas fa-clipboard-list text-sm"></i></span>
                                                Rekod Terkini
                                            </h3>
                                            <div class="flex gap-2">
                                                <button onClick={handleExport} class="p-3 rounded-2xl bg-white/5 text-slate-300 hover:bg-emerald-500 hover:text-white transition-all"><i class="fas fa-file-csv"></i></button>
                                                <button onClick={() => window.print()} class="p-3 rounded-2xl bg-white/5 text-slate-300 hover:bg-brand-blue hover:text-white transition-all"><i class="fas fa-print"></i></button>
                                            </div>
                                        </div>

                                        <div class="overflow-x-auto min-h-[500px]">
                                            {displayRecords.length > 0 ? (
                                                <table class="w-full text-left">
                                                    <thead>
                                                        <tr class="bg-slate-900/40 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">
                                                            <th class="px-8 py-5">Murid & Nama Kelas</th>
                                                            <th class="px-8 py-5">Aktiviti</th>
                                                            <th class="px-8 py-5 text-right print:hidden">Aksi</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-white/5">
                                                        {displayRecords.map((r, i) => (
                                                            <tr key={i} class="hover:bg-white/5 transition-colors group">
                                                                <td class="px-8 py-6">
                                                                    <div class="font-black text-white text-sm uppercase tracking-tight">{r.nama}</div>
                                                                    <div class="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest">{r.tingkatan} {r.kelas}</div>
                                                                </td>
                                                                <td class="px-8 py-6">
                                                                    <div class="text-xs font-bold text-slate-200 mb-2 uppercase tracking-wide">{r.acara}</div>
                                                                    <div class="flex gap-2">
                                                                        <span class="px-3 py-1 rounded-lg bg-brand-blue/10 text-brand-blue text-[9px] font-black uppercase tracking-tighter border border-brand-blue/20">{r.peringkat}</span>
                                                                        <span class="px-3 py-1 rounded-lg bg-emerald-500/10 text-emerald-400 text-[9px] font-black uppercase tracking-tighter border border-emerald-400/20">{r.pencapaian}</span>
                                                                    </div>
                                                                </td>
                                                                <td class="px-8 py-6 text-right print:hidden">
                                                                    <button onClick={()=>handleEditClick(r)} class="w-10 h-10 rounded-2xl bg-white/5 text-slate-400 hover:bg-brand-blue hover:text-white transition-all md:opacity-0 md:group-hover:opacity-100">
                                                                        <i class="fas fa-edit text-sm"></i>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            ) : (
                                                <div class="py-32 text-center">
                                                    <i class="fas fa-ghost text-5xl text-slate-700 mb-4 block"></i>
                                                    <p class="text-slate-500 font-bold text-sm tracking-widest">Tiada rekod ditemui.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'analysis' && stats && (
                            <div class="space-y-8 animate-in slide-in-from-bottom-6 duration-700">
                                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                    <div class="glass-card p-8 rounded-[3rem] neon-border-blue flex flex-col items-center text-center">
                                        <div class="w-16 h-16 rounded-3xl bg-brand-blue/20 flex items-center justify-center mb-6 text-brand-blue text-2xl"><i class="fas fa-users"></i></div>
                                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Penyertaan</span>
                                        <h4 class="text-4xl font-black text-white">{stats.total}</h4>
                                    </div>
                                    <div class="glass-card p-8 rounded-[3rem] border-white/5 flex flex-col items-center text-center">
                                        <div class="w-16 h-16 rounded-3xl bg-brand-yellow/10 flex items-center justify-center mb-6 text-brand-yellow text-2xl"><i class="fas fa-trophy"></i></div>
                                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Jumlah Acara</span>
                                        <h4 class="text-4xl font-black text-white">{stats.acara}</h4>
                                    </div>
                                    <div class="glass-card p-8 rounded-[3rem] border-white/5 flex flex-col items-center text-center">
                                        <div class="w-16 h-16 rounded-3xl bg-emerald-500/10 flex items-center justify-center mb-6 text-emerald-400 text-2xl"><i class="fas fa-star"></i></div>
                                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Top Peringkat</span>
                                        <h4 class="text-xl font-black text-white truncate w-full uppercase">{stats.peringkat[0]?.[0]}</h4>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div class="glass-card p-10 rounded-[3.5rem] border-none">
                                        <h3 class="text-white font-black text-sm uppercase tracking-[0.3em] mb-10 flex items-center gap-3">
                                            <i class="fas fa-chart-pie text-brand-blue"></i> Taburan Peringkat
                                        </h3>
                                        <div class="space-y-8">
                                            {stats.peringkat.map(([name, count], index) => {
                                                const pct = (count / stats.total) * 100;
                                                return (
                                                    <div key={index} class="space-y-3">
                                                        <div class="flex justify-between items-center px-1">
                                                            <span class="text-xs font-black text-slate-300 uppercase">{name}</span>
                                                            <span class="text-xs font-black text-brand-blue">{count} Rekod</span>
                                                        </div>
                                                        <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                                                            <div class="h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${pct}%`, background: 'linear-gradient(90deg, #1FA3D1, #2dd4bf)', boxShadow: '0 0 10px rgba(31,163,209,0.3)' }}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div class="glass-card p-10 rounded-[3.5rem] border-none">
                                        <h3 class="text-white font-black text-sm uppercase tracking-[0.3em] mb-10 flex items-center gap-3">
                                            <i class="fas fa-medal text-brand-yellow"></i> Pelajar Paling Aktif
                                        </h3>
                                        <div class="space-y-5">
                                            {stats.topStudents.map(([name, count], index) => (
                                                <div key={index} class="flex items-center justify-between p-5 bg-white/5 rounded-[2rem] border border-white/5 hover:border-brand-blue/30 transition-all group">
                                                    <div class="flex items-center gap-5">
                                                        <div class="w-12 h-12 rounded-2xl bg-slate-900 border border-white/10 flex items-center justify-center font-black text-brand-blue text-sm group-hover:scale-110 transition-transform">
                                                            {index + 1}
                                                        </div>
                                                        <span class="text-xs font-black text-slate-200 uppercase tracking-tight">{name}</span>
                                                    </div>
                                                    <div class="px-4 py-2 bg-brand-blue/20 rounded-xl text-[10px] font-black text-brand-blue uppercase tracking-tighter">
                                                        {count} Acara
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav class="sm:hidden glass-card fixed bottom-8 left-8 right-8 z-[100] h-20 rounded-[2.5rem] border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center justify-around px-6">
                        <button onClick={()=>setActiveTab('form')} class={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'form' ? 'text-brand-blue scale-110' : 'text-slate-500'}`}>
                            <i class="fas fa-house-chimney text-xl"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Utama</span>
                        </button>
                        <button onClick={loadAllData} class="w-14 h-14 -mt-16 btn-gradient text-white rounded-[1.5rem] shadow-[0_10px_30px_rgba(31,163,209,0.4)] border-[6px] border-dark-bg flex items-center justify-center">
                            <i class={`fas fa-sync-alt text-lg ${loading ? 'fa-spin' : ''}`}></i>
                        </button>
                        <button onClick={()=>setActiveTab('analysis')} class={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'analysis' ? 'text-brand-blue scale-110' : 'text-slate-500'}`}>
                            <i class="fas fa-chart-simple text-xl"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Data</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
